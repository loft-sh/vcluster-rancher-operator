apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcluster-rancher-operator
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: vcluster-rancher-operator
    app.kubernetes.io/name: vcluster-rancher-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: vcluster-rancher-operator
      app.kubernetes.io/name: vcluster-rancher-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: vcluster-rancher-operator
        app.kubernetes.io/name: vcluster-rancher-operator
    spec:
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: "{{ template "default_registry" . }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.Version }}"
        ports: []
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts: []
        {{- $m := default (dict) .Values.fleet.projectUIDToWorkspaceMappings -}} # TODO: make sure that the map to comma separated string logic work
        {{- $pairs := list -}}
        {{- range $k, $v := $m }}
          {{- $pairs = append $pairs (printf "%s:%s" $k $v) -}}
        {{- end }}
        env:
          - name: VCLUSTER_FLEET_DEFAULT_WORKSPACE
            value: {{ .Values.fleet.defaultWorkspace }}
          - name: VCLUSTER_FLEET_PROJ_UID_WORKSPACE_MAPPINGS
            value: {{ join "," $pairs | quote }}
          - name: VCLUSTER_SYNC_INCLUDE_LABEL_KEYS
            value: {{ join "," (default (list) (.Values.syncLabels.includeKeys | default (list)) ) | quote }}
          - name: VCLUSTER_SYNC_EXCLUDE_LABEL_KEYS
            value: {{ join "," (default (list) (.Values.syncLabels.excludeKeys | default (list)) ) | quote }}
      volumes: []
      serviceAccountName: vcluster-rancher-operator
      terminationGracePeriodSeconds: 10
