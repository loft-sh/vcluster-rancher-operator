name: E2E - Host Cluster

on:
  push:
  pull_request:

jobs:
  host-cluster:
    name: Setup host cluster with vcluster (docker driver)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup DevSpace
        uses: loft-sh/setup-devspace@main
        with:
          version: v6.3.18

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Run e2e
        timeout-minutes: 25
        run: just e2e-linux
